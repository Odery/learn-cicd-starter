name: CI/CD

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up GO env
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Run tests 
        run: go test ./... -cover
  format:
    name: Force gofmt formatting
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up GO env
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Force formatting
        run: go fmt ./...
  lint:
    name: Code static analysys (Lint)
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up GO env
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...
  security:
    name: Security analysys
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up GO env
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run a gosec check
        run: gosec ./...
