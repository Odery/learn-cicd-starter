name: CI/CD

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up GO env
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Run tests 
        run: go test ./...
