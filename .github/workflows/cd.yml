name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up GO env
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
      - name: Build the Docker container
        run: scripts/buildprod.sh
